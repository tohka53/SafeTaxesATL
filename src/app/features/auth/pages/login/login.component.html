<section class="mx-auto flex min-h-[70vh] max-w-md items-center px-4 py-12">
  <div class="w-full">
    <div class="mb-6 text-center">
      <h1 class="text-2xl font-extrabold text-gray-900">{{ 'auth.loginTitle' | translate }}</h1>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="card space-y-4">
      <div *ngIf="error" class="rounded-lg border border-red-200 bg-red-50 p-3 text-sm text-red-700">
        {{ error }}
      </div>
      <div>
        <label class="label">{{ 'auth.email' | translate }}</label>
        <input class="input" type="email" formControlName="email" autocomplete="email" />
        <p *ngIf="invalid('email')" class="field-error">{{ 'common.required' | translate }}</p>
      </div>
      <div>
        <label class="label">{{ 'auth.password' | translate }}</label>
        <input class="input" type="password" formControlName="password" autocomplete="current-password" />
        <p *ngIf="invalid('password')" class="field-error">{{ 'common.required' | translate }}</p>
      </div>
      <button type="submit" class="btn-primary w-full" [disabled]="loading">
        {{ loading ? ('common.loading' | translate) : ('auth.signIn' | translate) }}
      </button>
      <p class="text-center text-sm text-gray-600">
        {{ 'auth.noAccount' | translate }}
        <a routerLink="/auth/register" class="font-semibold text-brand-600 hover:underline">{{ 'auth.goRegister' | translate }}</a>
      </p>
    </form>
  </div>
</section>
