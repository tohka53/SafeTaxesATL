<section class="mx-auto max-w-4xl px-4 py-12 sm:px-6 lg:px-8">
  <header class="mb-6 flex items-center justify-between">
    <h1 class="text-2xl font-extrabold text-gray-900">{{ title }}</h1>
    <a routerLink="/formulario" class="text-sm font-semibold text-brand-600 hover:underline">← {{ 'common.back' | translate }}</a>
  </header>

  <div *ngIf="success" class="mb-6 rounded-lg border border-accent-500 bg-green-50 p-4 text-sm text-green-800">
    ✅ {{ 'pf.saved' | translate }}
    <span class="block text-green-700">{{ 'contact.success' | translate }}</span>
  </div>

  <ng-container *ngIf="!loading">
    <app-client-profile-form
      *ngIf="isCustom"
      mode="public"
      [initial]="initial"
      (submitted)="onSubmit($event)"
    ></app-client-profile-form>

    <app-dynamic-form
      *ngIf="!isCustom && def"
      [def]="def"
      mode="public"
      [initial]="initial"
      (submitted)="onSubmit($event)"
    ></app-dynamic-form>
  </ng-container>
</section>
